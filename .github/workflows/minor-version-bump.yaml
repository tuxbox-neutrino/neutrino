name: Configure Minor Version Bump

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without changing configure.ac or pushing commits"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup tagit
        id: setup
        uses: ./.github/actions/setup-tagit

      - name: Bump configure.ac minor version
        run: |
          set -euo pipefail

          ver_major="${{ steps.setup.outputs.ver_major }}"
          ver_minor="${{ steps.setup.outputs.ver_minor }}"
          ver_micro="${{ steps.setup.outputs.ver_micro }}"

          target_minor=$((ver_minor + 1))
          target_patch=0
          echo "Bumping configure.ac from ${ver_major}.${ver_minor}.${ver_micro} to ${ver_major}.${target_minor}.${target_patch}"

          dry_args=()
          if [ "${DRY_RUN}" = "true" ]; then
            dry_args+=(--dry-run)
          fi

          python /tmp/tagit.py \
            -f configure.ac \
            --scheme-file tagit-config.json \
            --version-mode increment \
            --tag-format "3.{minor}.{patch}" \
            --major "$ver_major" \
            --minor "$target_minor" \
            --patch "$target_patch" \
            --no-tag \
            "${dry_args[@]}"

      - name: Commit and push changes
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run enabled; skipping commit and push."
            exit 0
          fi

          git add configure.ac
          git diff --cached --quiet && {
            echo "No changes to commit"
            exit 0
          }
          git commit -m "build (ci): bump configure.ac minor version [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
