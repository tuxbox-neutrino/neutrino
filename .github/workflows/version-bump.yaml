name: Configure Version Bump

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without changing configure.ac or pushing commits"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "configure.ac"

concurrency:
  group: configure-version-bump-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup tagit
        id: setup
        uses: ./.github/actions/setup-tagit

      - name: Bump configure.ac version
        run: |
          set -euo pipefail

          ver_major="${{ steps.setup.outputs.ver_major }}"
          ver_minor="${{ steps.setup.outputs.ver_minor }}"
          ver_micro="${{ steps.setup.outputs.ver_micro }}"

          anchor_tag="${ver_major}.${ver_minor}"
          if git rev-parse -q --verify "refs/tags/${anchor_tag}" >/dev/null; then
            commit_count=$(git rev-list --count "${anchor_tag}"..HEAD)
            target_patch=$((commit_count + 1))
            echo "Using anchor tag ${anchor_tag}; commits since tag: ${commit_count}"
          else
            target_patch=$((ver_micro + 1))
            echo "Anchor tag ${anchor_tag} not found; falling back to ver_micro + 1"
          fi

          echo "Bumping configure.ac from ${ver_major}.${ver_minor}.${ver_micro} to ${ver_major}.${ver_minor}.${target_patch}"

          dry_args=()
          if [ "${DRY_RUN}" = "true" ]; then
            dry_args+=(--dry-run)
          fi

          python /tmp/tagit.py \
            -f configure.ac \
            --scheme-file tagit-config.json \
            --version-mode increment \
            --tag-format "3.{minor}.{patch}" \
            --major "$ver_major" \
            --minor "$ver_minor" \
            --patch "$target_patch" \
            --no-tag \
            "${dry_args[@]}"

      - name: Commit and push changes
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run enabled; skipping commit and push."
            exit 0
          fi

          git add configure.ac
          git diff --cached --quiet && {
            echo "No changes to commit"
            exit 0
          }
          git commit -m "build (ci): bump configure.ac version [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
