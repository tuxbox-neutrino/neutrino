name: Tagging Workflow

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without creating tags or pushing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup tagit
        id: setup
        uses: ./.github/actions/setup-tagit

      - name: Tagging
        run: |
          set -euo pipefail

          ver_major="${{ steps.setup.outputs.ver_major }}"
          ver_minor="${{ steps.setup.outputs.ver_minor }}"
          ver_micro="${{ steps.setup.outputs.ver_micro }}"

          last_tag=$(git describe --tags --match "3.${ver_minor}*" --abbrev=0 2>/dev/null || true)
          last_patch=0
          if [ -n "$last_tag" ]; then
            IFS='.' read -r _ _ last_patch <<< "$last_tag"
            last_patch=${last_patch:-0}
          fi

          dry_args=()
          if [ "${DRY_RUN}" = "true" ]; then
            dry_args+=(--dry-run)
          fi

          target_patch="$ver_micro"
          if [ -n "$last_tag" ]; then
            commits_since=$(git rev-list --count "${last_tag}..HEAD")

            if [ "$commits_since" -eq 0 ] && [ "$ver_micro" -ne "$last_patch" ]; then
              echo "configure.ac ver_micro (${ver_micro}) differs from last tag (${last_tag}); syncing version."
              python /tmp/tagit.py \
                -f configure.ac \
                --scheme-file tagit-config.json \
                --version-mode increment \
                --tag-format "3.{minor}.{patch}" \
                --major "$ver_major" \
                --minor "$ver_minor" \
                --patch "$last_patch" \
                --no-tag \
                "${dry_args[@]}"
              exit 0
            fi

            if [ "$ver_micro" -lt "$last_patch" ]; then
              echo "configure.ac ver_micro (${ver_micro}) is behind last tag (${last_tag})."
              exit 1
            fi

            if [ "$ver_micro" -le "$last_patch" ]; then
              if [ "$commits_since" -eq 0 ]; then
                echo "No new commits since ${last_tag}; nothing to tag."
                exit 0
              fi
              target_patch=$((last_patch + 1))
            fi
          fi

          python /tmp/tagit.py \
            -f configure.ac \
            --scheme-file tagit-config.json \
            --version-mode increment \
            --tag-format "3.{minor}.{patch}" \
            --major "$ver_major" \
            --minor "$ver_minor" \
            --patch "$target_patch" \
            "${dry_args[@]}"

          # Year-based alias tag: ver_minor is expected to represent a year
          # (e.g. 25 for 2025). This creates an additional tag in YYYY.patch
          # format (e.g. 2025.3) so releases can be referenced by calendar year.
          year_short="$ver_minor"
          if [ ${#year_short} -eq 4 ]; then
            year_full="$year_short"
          elif [ ${#year_short} -le 2 ]; then
            year_full="20${year_short}"
          else
            echo "::warning::ver_minor '${year_short}' is not a recognized year format; skipping year tag."
            year_full=""
          fi

          if [ -n "$year_full" ]; then
            year_tag="${year_full}.${target_patch}"
            if [ "${DRY_RUN}" = "true" ]; then
              if git rev-parse -q --verify "refs/tags/${year_tag}" >/dev/null; then
                echo "Would skip existing tag: ${year_tag}"
              else
                echo "Would create tag: ${year_tag}"
              fi
            else
              if ! git rev-parse -q --verify "refs/tags/${year_tag}" >/dev/null; then
                git tag -a "$year_tag" -m "Release $year_tag"
                echo "Created tag: ${year_tag}"
              else
                echo "Tag already exists: ${year_tag}"
              fi
            fi
          fi

      - name: Commit and push changes
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run enabled; skipping commit and push."
            exit 0
          fi

          git add configure.ac
          git commit -m "tagging: Automatically updated tags [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin --tags
